services:
  - type: web
    name: khan-jan-seva-kendra
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: rembg s --host 0.0.0.0 --port $PORT --log_level info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
    healthCheckPath: /api
    autoDeploy: true
